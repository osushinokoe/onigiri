<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>さほの自己紹介</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      color: #333;
    }
    p {
      color: #666;
      font-size: 16px;
    }
    .emoji {
      font-size: 50px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🍙</div>
    <h1>こんにちは、さほです！</h1>
    <p>はじめまして！私の名前はさほです。</p>
    <p>おにぎりが大好きです 🍙</p>
    <p>これからよろしくお願いします！</p>
  </div>
</body>
</html>
